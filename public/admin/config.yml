backend:
  name: git-gateway
  branch: main

media_folder: public/assets/uploads
public_folder: /assets/uploads

collections:
  - name: "config"
    label: "Configuração Geral"
    delete: false
    editor:
      preview: false
    files:
      - name: "hero"
        label: "Banner (Hero)"
        file: "src/content/hero.json"
        fields:
          - { label: "Título", name: "title", widget: "string" }
          - { label: "Subtítulo", name: "subtitle", widget: "text" }
          - { label: "Imagem de Fundo", name: "backgroundImage", widget: "image" }
          - { label: "Texto do Botão WhatsApp", name: "whatsappText", widget: "string" }
      
      - name: "contact"
        label: "Contato"
        file: "src/content/contact.json"
        fields:
          - { label: "Número do WhatsApp (apenas números com DDD)", name: "whatsappNumber", widget: "string" }

      - name: "content_sections"
        label: "Conteúdo das Seções"
        file: "src/content/sections.json"
        fields:
          - label: "Seção de Problema (PAS)"
            name: "problem"
            widget: "object"
            fields:
              - { label: "Título Principal", name: "title", widget: "string" }
              - { label: "Subtítulo de Impacto", name: "subtitle", widget: "text" }
              - { label: "Texto de Agitação da Dor", name: "agitation", widget: "text" }
              - { label: "Imagem Ilustrativa", name: "image", widget: "image" }
              - { label: "Título da Ponte (Transição)", name: "bridge_title", widget: "string" }
              - { label: "Texto da Ponte (Transição)", name: "bridge_text", widget: "text" }
          
          - label: "Como Funciona (Passos)"
            name: "how_it_works"
            widget: "list"
            fields:
              - { label: "Título do Passo", name: "step_title", widget: "string" }
              - { label: "Descrição", name: "step_desc", widget: "text" }
              - { label: "Ícone", name: "icon", widget: "select", options: ["ClipboardCheck", "Wrench", "Sun", "TrendingDown", "Zap"] }
          
          - label: "Seção de Solução (Benefícios)"
            name: "solution"
            widget: "object"
            fields:
              - { label: "Título Principal", name: "title", widget: "string" }
              - { label: "Subtítulo", name: "subtitle", widget: "text" }
              - { label: "Imagem Lateral", name: "image", widget: "image" }
              - label: "Benefícios em Destaque"
                name: "benefits"
                widget: "list"
                fields:
                  - { label: "Título do Benefício", name: "title", widget: "string" }
                  - { label: "Descrição", name: "description", widget: "text" }
                  - { label: "Ícone", name: "icon", widget: "select", options: ["TrendingUp", "ShieldCheck", "Leaf", "CheckCircle2", "Zap", "Sun"] }

  - name: "services"
    label: "Serviços"
    folder: "src/content/services"
    extension: "json"
    format: "json"
    create: true
    slug: "{{title}}"
    fields:
      - { label: "Título", name: "title", widget: "string" }
      - { label: "Descrição", name: "description", widget: "text" }
      - label: "Ícone"
        name: "icon"
        widget: "select"
        options: ["Zap", "Sun", "HardHat", "Wrench", "Home", "Building2", "ShieldCheck", "Award", "Users"]

  - name: "portfolio"
    label: "Portfólio"
    folder: "src/content/portfolio"
    extension: "json"
    format: "json"
    create: true
    slug: "{{serviceTitle}}-{{clientName}}"
    fields:
      - { label: "Título do Serviço", name: "serviceTitle", widget: "string" }
      - { label: "Cliente", name: "clientName", widget: "string" }
      - label: "Categoria"
        name: "category"
        widget: "select"
        options: ["Elétrica", "Placas Solares", "Reformas", "Manutenção"]
      - { label: "Imagem de Capa", name: "coverImage", widget: "image" }
      - { label: "Descrição Detalhada", name: "description", widget: "text" }
      - label: "Galeria de Imagens"
        name: "galleryImages"
        widget: "list"
        fields:
          - { label: "Imagem", name: "src", widget: "image" }
          - { label: "Legenda (Opcional)", name: "label", widget: "string", required: false }

  - name: "faq"
    label: "FAQ (Perguntas Frequentes)"
    folder: "src/content/faq"
    extension: "json"
    format: "json"
    create: true
    slug: "{{question}}"
    fields:
      - { label: "Pergunta", name: "question", widget: "string" }
      - { label: "Resposta", name: "answer", widget: "text" }
